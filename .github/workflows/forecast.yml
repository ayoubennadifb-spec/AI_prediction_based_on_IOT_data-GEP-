name: LSTM forecast (free)

# Runs the LSTM inference worker for ONE cycle on a schedule -- a FREE
# replacement for a paid Render background worker. GitHub Actions handles the
# cadence (cron); the worker runs once (RUN_ONCE) and exits.
#
# Secrets to set in: repo Settings -> Secrets and variables -> Actions:
#   SRC_INFLUX_URL, SRC_INFLUX_ORG,
#   SRC_INFLUX_TOKEN_ZONE1, SRC_INFLUX_TOKEN_ZONE2   (Ayman's per-bucket tokens)
#   DST_INFLUX_URL, DST_INFLUX_ORG, DST_INFLUX_TOKEN  (your base, read+write)
#
# NOTE on free minutes:
#   - PUBLIC repo  -> GitHub Actions minutes are UNLIMITED (free). Keep */15.
#   - PRIVATE repo -> 2000 min/month free; use a slower cron (e.g. "0 * * * *"
#     = hourly) to stay under the limit (TensorFlow install is ~1-3 min/run).

on:
  schedule:
    - cron: "*/15 * * * *"     # every 15 min (UTC). GitHub may delay under load.
  workflow_dispatch: {}          # manual "Run workflow" button for testing

concurrency:
  group: forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: render_worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: render_worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one forecast cycle
        env:
          RUN_ONCE: "1"
          SRC_INFLUX_URL: ${{ secrets.SRC_INFLUX_URL }}
          SRC_INFLUX_ORG: ${{ secrets.SRC_INFLUX_ORG }}
          SRC_INFLUX_TOKEN_ZONE1: ${{ secrets.SRC_INFLUX_TOKEN_ZONE1 }}
          SRC_INFLUX_TOKEN_ZONE2: ${{ secrets.SRC_INFLUX_TOKEN_ZONE2 }}
          SRC_BUCKET_ZONE1: Data
          SRC_BUCKET_ZONE2: Zone2
          DST_INFLUX_URL: ${{ secrets.DST_INFLUX_URL }}
          DST_INFLUX_ORG: ${{ secrets.DST_INFLUX_ORG }}
          DST_INFLUX_TOKEN: ${{ secrets.DST_INFLUX_TOKEN }}
          DST_BUCKET: predictions
          SERVE_ZONE2_PROXY: "true"
        run: python production_worker.py
